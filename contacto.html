    <!--Formulario de contacto-->
    <section class="contacto-container">
        <h2>Contáctame</h2>
        <p>¿Quieres una sesión de fotos o tienes dudas? ¡Escríbeme!</p>

        <form class="form-contacto" onsubmit="enviarFormulario(event)">
            <label>Nombre</label>
            <input type="text" required>

            <label>Correo</label>
            <input type="email" required>

            <label>Mensaje</label>
            <textarea required></textarea>

            <button type="submit" class="btn">Enviar mensaje</button>
        </form>
    </section>
